<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTEmotionAnalyzer</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Font (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1E1F4B, #3A3AFF);
      min-height: 100vh;
    }
  </style>
</head>
<body class="text-white">

  <!-- 🌐 Landing Page -->
  <section id="landingPage" class="flex flex-col items-center justify-center h-screen text-center px-4">
    <h1 class="text-4xl font-bold mb-2">YTEmotionAnalyzer</h1>
    <p class="text-lg text-gray-200 mb-6">Understand audience emotions — straight from YouTube comments.</p>

    <form id="analysisForm" class="flex flex-col md:flex-row gap-4 w-full max-w-xl">
      <input type="text" id="youtubeLinkInput" placeholder="Paste a YouTube video link"
             class="flex-1 p-3 rounded-xl text-gray-900 focus:outline-none">
      <button id="analyzeButton" type="submit"
              class="bg-cyan-500 hover:bg-cyan-400 text-white font-semibold rounded-xl px-6 py-3 transition-all">
        <span>Analyze</span>
      </button>
    </form>

    <div id="loadingIndicator" class="hidden mt-6 flex-col items-center gap-2">
      <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-cyan-400"></div>
      <p>Analyzing comments...</p>
    </div>

    <div id="errorMessage" class="hidden mt-4 text-red-300">
      ⚠️ <span id="errorText"></span>
    </div>
  </section>

  <!-- 📊 Dashboard -->
  <section id="dashboardPage" class="hidden p-6 md:p-12 bg-slate-50 dark:bg-slate-900 min-h-screen text-slate-800 dark:text-slate-100">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold">Analysis Dashboard</h2>
      <button id="backButton" class="text-sm bg-slate-700 text-white px-4 py-2 rounded-lg hover:bg-slate-600">← Back</button>
    </div>

    <div class="grid md:grid-cols-2 gap-8">
      <!-- Left: Video Info -->
      <div>
        <img id="videoThumbnail" src="" alt="Video thumbnail" class="rounded-2xl shadow-lg w-full mb-4">
        <h3 id="videoTitle" class="text-xl font-semibold"></h3>
      </div>

      <!-- Right: Summary -->
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white/10 p-4 rounded-xl text-center">
          <p class="text-gray-300">Total Comments</p>
          <h4 id="totalComments" class="text-2xl font-bold">0</h4>
        </div>
        <div class="bg-white/10 p-4 rounded-xl text-center">
          <p class="text-gray-300">Total Likes</p>
          <h4 id="totalLikes" class="text-2xl font-bold">0</h4>
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid md:grid-cols-2 gap-6 mt-10">
      <div class="bg-white/5 p-4 rounded-xl">
        <h3 class="text-lg font-semibold mb-2">Sentiment Summary</h3>
        <div class="relative h-60">
          <canvas id="sentimentChart"></canvas>
        </div>
      </div>
      <div class="bg-white/5 p-4 rounded-xl">
        <h3 class="text-lg font-semibold mb-2">Emotion Distribution</h3>
        <div class="relative h-60">
          <canvas id="emotionChart"></canvas>
        </div>
      </div>
    </div>
  </section>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
