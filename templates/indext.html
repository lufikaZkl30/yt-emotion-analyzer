<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>YouNalyze - Analisis Komentar YouTube</title>
  <style>
    body { font-family: sans-serif; background: #f4f6fa; text-align: center; padding: 40px; }
    input { width: 300px; padding: 8px; }
    button { padding: 8px 12px; cursor: pointer; margin-left: 5px; }
    pre { text-align: left; background: #fff; padding: 20px; border-radius: 10px; margin-top: 20px; display: inline-block; }
  </style>
</head>
<body>
  <h1>🎥 YouNalyze</h1>
  <form id="analyzeForm">
    <input type="text" id="videoUrl" name="videoUrl" placeholder="Masukkan URL YouTube..." required>
    <button type="submit">Analisis</button>
  </form>

  <pre id="result"></pre>

  <script>
    const form = document.getElementById('analyzeForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const res = await fetch('/analyze', { method: 'POST', body: formData });
      const data = await res.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
